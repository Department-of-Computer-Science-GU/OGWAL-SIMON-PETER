<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam URL Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="url"], input[type="text"] {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input[type="url"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        #result-container {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .result-scam {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .result-safe {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .result-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .result-scam .result-title { color: var(--danger); }
        .result-safe .result-title { color: var(--success); }

        .result-prob {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h1>SafeSurf</h1>
            <p class="subtitle">AI-Powered Scam URL Detection</p>

            <div class="input-group">
                <input type="text" id="url-input" placeholder="https://example.com/..." autocomplete="off">
                <button id="check-btn" onclick="checkUrl()">
                    <span id="btn-text">Analyze URL</span>
                    <div id="spinner" class="spinner"></div>
                </button>
            </div>

            <div id="result-container">
                <div id="result-icon" class="result-icon"></div>
                <div id="result-title" class="result-title"></div>
                <div id="result-prob" class="result-prob"></div>
            </div>
        </div>
    </div>

    <script>
        async function checkUrl() {
            const urlInput = document.getElementById('url-input').value.trim();
            if (!urlInput) return;

            const btn = document.getElementById('check-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            const resultContainer = document.getElementById('result-container');

            // UI Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            resultContainer.style.display = 'none';
            resultContainer.style.opacity = '0';
            resultContainer.className = '';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult(data);
                } else {
                    alert('Error: ' + (data.error || 'Unknown error occurred.'));
                }
            } catch (error) {
                alert('Network error. Please try again later.');
                console.error(error);
            } finally {
                // UI Reset state
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function showResult(data) {
            const resultContainer = document.getElementById('result-container');
            const resultIcon = document.getElementById('result-icon');
            const resultTitle = document.getElementById('result-title');
            const resultProb = document.getElementById('result-prob');

            resultContainer.style.display = 'block';
            
            // Trigger reflow for animation
            void resultContainer.offsetWidth;
            
            resultContainer.style.opacity = '1';
            resultContainer.style.animation = 'fadeIn 0.5s ease-out';

            const probPercentage = (data.probability * 100).toFixed(1);

            if (data.is_scam) {
                resultContainer.className = 'result-scam';
                resultIcon.textContent = '🚨';
                resultTitle.textContent = 'Phishing / Scam Detected';
                resultProb.textContent = `Confidence: ${probPercentage}%`;
            } else {
                resultContainer.className = 'result-safe';
                resultIcon.textContent = '✅';
                resultTitle.textContent = 'Safe to Browse';
                resultProb.textContent = `Safety Confidence: ${probPercentage}%`;
            }
        }
    </script>
</body>
</html>
